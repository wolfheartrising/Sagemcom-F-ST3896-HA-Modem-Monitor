name: "Modem Monitor"
version: "3.4.4"
slug: "modem_monitor"

description: "Sagemcom F@ST3896 modem monitor -- non-blocking threaded architecture, instant startup visibility"

arch:
  - amd64

startup: application
boot: auto
init: false

host_network: true

options:
  interval: 60
  modem_host: "192.168.100.1"
  modem_username: ""
  modem_password: ""
  http_port: 8099
  mqtt_enabled: false
  mqtt_host: "core-mosquitto"
  mqtt_topic: "modem/telemetry"
  mqtt_username: ""
  mqtt_password: ""

schema:
  interval: int(10,300)
  modem_host: str
  modem_username: str
  modem_password: str
  http_port: int(1024,65535)
  mqtt_enabled: bool
  mqtt_host: str
  mqtt_topic: str
  mqtt_username: str
  mqtt_password: str
